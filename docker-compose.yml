# Stack: Backend + DB only. Exposed via Traefik on cpp-edge network.

networks:
  cpp-edge:
    external: true
    name: cpp-edge
  internal:

services:
  files-db:
    image: postgres:16-alpine
    container_name: files-db
    environment:
      POSTGRES_USER: ${PGUSER:-files}
      POSTGRES_PASSWORD: ${PGPASSWORD:-files}
      POSTGRES_DB: ${PGDATABASE:-files}
    volumes:
      - files-db-data:/var/lib/postgresql/data
    networks:
      - internal
      - cpp-edge
    restart: unless-stopped

  dateimanager-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dateimanager-backend
    environment:
      PORT: 8002
      PGHOST: files-db
      PGUSER: ${PGUSER:-files}
      PGPASSWORD: ${PGPASSWORD:-files}
      PGDATABASE: ${PGDATABASE:-files}
      STORAGE_DIR: /data/files
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-http://authentik-server:9000/auth/application/o/cpp/jwks/}
      AUTH_ISSUER: ${AUTH_ISSUER:-}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:-}
      AUTH_SUBJECT_CLAIM: ${AUTH_SUBJECT_CLAIM:-sub}
      AUTH_ALLOW_DEV_HEADER: ${AUTH_ALLOW_DEV_HEADER:-true}
    volumes:
      - files-storage:/data/files
    ports:
      - "8002:8002"
    networks:
      - internal
      - cpp-edge
    depends_on:
      - files-db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dateimanager.rule=PathPrefix(`/files`) || Path(`/health`) || Path(`/openapi.json`)"
      - "traefik.http.routers.dateimanager.entrypoints=websecure"
      - "traefik.http.routers.dateimanager.tls.certresolver=letsencrypt"
      - "traefik.http.services.dateimanager.loadbalancer.server.port=8002"
    restart: unless-stopped

volumes:
  files-db-data:
  files-storage:
